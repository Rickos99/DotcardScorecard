<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Dotcard Scorecard</title>

        <link rel="stylesheet" href="main.css" />
        <link rel="stylesheet" href="css/keyboard.css" />
        <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
        <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&display=swap" rel="stylesheet" />
        <link href="https://fonts.googleapis.com/icon?family=Material+Icons|Material+Icons+Outlined" rel="stylesheet" />

        <script type="module" src="javascript/main.js"></script>
    </head>

    <body class="container">
        <div id="navigation" class="hidden">
            <div class="container">
                <span id="btn-close-nav" gui-role="toogle-navigation" class="material-icons pointer">close</span>
                <div>
                    <button id="btnSaveGameAs" class="d-none-test">Save game as</button>
                    <span class="vr d-none-test"></span>
                    <button id="btnExportGame">Export</button>
                    <button id="btnImportGame">Import</button>
                </div>
                <div>
                    <h2>Players</h2>
                    <div id="playernames-inputs"></div>
                    <button id="btnAddPlayerToList">Add a player</button>
                    <button id="btnStartNewGame">Start a new game</button>
                </div>
                <hr />
                <div class="d-none-test">
                    <h2>Previous games</h2>
                    <ul id="previousGamesList"></ul>
                </div>
            </div>
            <div id="navigation-handle">
                <span class="material-icons shadow-sm pointer" gui-role="toogle-navigation">expand_more</span>
            </div>
        </div>
        <script></script>
        <div>
            <table id="scorecard" class="shadow-lg scorecard">
                <thead>
                    <tr>
                        <td colspan="1" id="card-header-datacell">
                            <h1 class="card-header">Dotcard</h1>
                        </td>
                        <td colspan="4">Bonus</td>
                    </tr>
                    <tr>
                        <th></th>
                        <th class="bonus-header">0</th>
                        <th class="bonus-header">-5</th>
                        <th class="bonus-header">-10</th>
                        <th class="bonus-header">-15</th>
                    </tr>
                </thead>
                <tbody></tbody>
                <tfoot>
                    <tr>
                        <td>&Sigma;</td>
                    </tr>
                </tfoot>
            </table>
        </div>
        <table class="numpad">
            <tbody>
                <tr>
                    <td><button>1</button></td>
                    <td><button>2</button></td>
                    <td><button>3</button></td>
                    <td>
                        <button class="btn-secondary"><span class="material-icons-outlined">backspace</span></button>
                    </td>
                </tr>
                <tr>
                    <td><button>4</button></td>
                    <td><button>5</button></td>
                    <td><button>6</button></td>
                    <td rowspan="2"><button class="btn-secondary">-</button></td>
                </tr>
                <tr>
                    <td><button>7</button></td>
                    <td><button>8</button></td>
                    <td><button>9</button></td>
                </tr>
                <tr>
                    <td colspan="2"><button>0</button></td>
                    <td>
                        <button class="btn-secondary"><span class="material-icons">keyboard_hide</span></button>
                    </td>
                    <td>
                        <button class="btn-accent"><span class="material-icons">keyboard_tab</span></button>
                    </td>
                </tr>
            </tbody>
        </table>
    </body>
</html>
